use_case: frozen
dependencies:
  - gymnasium
  - scikit-learn

environment:
  name: Frozen lake
  description: "Navigate across a frozen lake grid while avoiding falling into holes."
  filepaths:
    environment: frozen/environment.py

policy:
  name: Frozen
  description: ""
  filepaths:
    policy: frozen/policy.py
    tamer: frozen/tamer.py
  checkpoint_interval: 1

agents:
  - role: agent
    name: Frozen agent
    description: ""
    policy: Frozen
    participant: true
    keyboard_inputs:
      ArrowUp: 1
      ArrowDown: -1
      default: 0
    keyboard_input_display:
      ArrowUp:
        symbol: "\u2191"
        label: Good
      ArrowDown:
        symbol: "\u2193"
        label: Bad
    multiple_keyboard_inputs: false
    inputs_type: reward
    textual_inputs: false

experiment:
  link: frozen
  name: Frozen lake
  short_description: Frozen lake experiment
  long_description: Navigate a frozen lake grid using keyboard feedback to train a TAMER agent.
  enabled: true
  number_of_episodes: 3
  target_fps: 1.0
  wait_for_inputs: true